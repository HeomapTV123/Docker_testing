services:
  app:
    build:
      context: .
      dockerfile: ./BackEnd/Dockerfile
    container_name: recipetine_app
    ports:
      - "5000:5000"
    env_file:
      - ./.env
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: recipetine_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${password}
      MYSQL_DATABASE: ${database}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: