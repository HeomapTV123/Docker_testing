<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://kit.fontawesome.com/36e94b4c48.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="login-page-container">
        <div class="login-card">
        <div class="login-title">
            <header>
                <h2>Login</h2>
            </header>

            <section>
                <p>More than <emp>+1,000</emp> homemade recipes from around the world!</p>
            </section>
        </div>

        <div class="login-form-container">
            <form action="" id="loginForm">
                <div class="input-box">
                    <label for="username"></label>
                    <img src="/login/user.png" class="user-icon">
                    <input type="text"class="username" name="username" id="usernameLogin" aria-describedby="helpId" placeholder="Enter Username">
                </div>
                <div id="usernameLoginError"></div> 
                <div class="input-box" id="passwordContainer">
                    <label for="password"></label>
                    <img src="/login/password.png" class="password-icon">
                    <input type="password" class="password" name="" id="passwordLogin" placeholder="Password">
                    <span class="toggle-password" id="toggleBtn">
                        <i class="fas fa-eye"></i> <!-- Font Awesome eye icon -->
                        <i class="fas fa-eye-slash"></i>
                    </span>
                </div>
                <div id="passwordLoginError"></div>
                <div class="submit-box">
                     <button type="submit" class="login-btn">Login</button>
                </div>

                <div class="remember-me">
                    <label for="remember-me"></label>
                        <input type="checkbox" class="remember-me" name="" id="" value="checkedValue" unchecked>
                        Remember me
                </div>

                
            </form>
            <div class="register-link" id="login-link">
                    <p>Don't have an account?
                        <a href="/html/signup.html">Register here!</a>
                    </p>
            </div>
            <div class="homepage-link">
                <p>Go back to 
                    <a href="/html/main.html">homepage</a>
                </p>
            </div>
        </div>
        </div>
    </div>
    <script type="module" src="/js/script.js"></script>

</body>
</html>
